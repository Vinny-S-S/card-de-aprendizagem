<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartão de Aprendizado</title>
  <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
  <link rel="stylesheet" href="pre-cartao.css">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <!-- Section do card principal -->
  <section class="card-section">
    <div class="card">
      <div class="card-topo">
        <img src="imagens/img-topo.png" alt="Imagem do cabeçalho">
      </div>
      <div class="card-conteudo">
        <p class="categoria">Aprendendo</p>
        <p class="data">Publicado em 07 abril 2026</p>
        <h2>Fundamentos de HTML & CSS</h2>
        <p class="descricao">Essas Linguagens são a espinha dorsal de todo o site, definindo estruturas e cores.</p>
        <div class="autor">
          <img src="imagens/image-avatar.webp" alt="Foto do autor">
          <span>Greg Hooper</span>
        </div>
      </div>
    </div>
  </section>

  <!-- Section da seta -->
  <section class="seta-section">
    <div class="seta">▼</div>
  </section>

  <!-- Section do rodapé -->
  <footer class="footer-section">
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
      Coded by <a href="#">Vinícius</a>.
    </div>
  </footer>
</body>
</html>
